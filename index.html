<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Monkey Garage — Private Access</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;width:100%;overflow:hidden;}
  body {
    font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;
    background:linear-gradient(145deg,#00c8cc 0%,#74fcff 30%,#c2feff 55%,#ffffff 80%,#e8feff 100%);
    display:flex;flex-direction:column;align-items:center;
    position:relative;min-height:100vh;min-height:100dvh;
  }

  .orb{position:fixed;border-radius:50%;filter:blur(60px);opacity:0.4;pointer-events:none;animation:drift 10s ease-in-out infinite alternate;}
  .orb1{width:min(420px,75vw);height:min(420px,75vw);background:radial-gradient(circle,#74fcff,#00b8cc);top:-10%;left:-10%;animation-delay:0s;}
  .orb2{width:min(350px,65vw);height:min(350px,65vw);background:radial-gradient(circle,#ffffff,#c0f9ff);bottom:-8%;right:-8%;animation-delay:-4s;}
  .orb3{width:min(260px,50vw);height:min(260px,50vw);background:radial-gradient(circle,#aaf9ff,#74fcff);top:40%;left:5%;animation-delay:-7s;}
  @keyframes drift{0%{transform:translate(0,0) scale(1);}100%{transform:translate(20px,16px) scale(1.08);}}

  /* HEADER */
  .header {
    width:100%;position:relative;z-index:20;flex-shrink:0;
    background:rgba(255,255,255,0.22);
    backdrop-filter:blur(28px) saturate(180%);
    -webkit-backdrop-filter:blur(28px) saturate(180%);
    border-bottom:1px solid rgba(255,255,255,0.6);
    box-shadow:0 2px 20px rgba(116,252,255,0.2),0 1px 0 rgba(255,255,255,0.8) inset;
    display:flex;align-items:center;justify-content:center;
    padding:clamp(10px,2.5vw,16px) clamp(16px,4vw,32px);
    min-height:clamp(64px,11vw,88px);
  }
  .logo-wrap{display:flex;align-items:center;justify-content:center;height:clamp(40px,9vw,62px);}
  .logo-wrap img{
    height:100%;width:auto;max-width:min(280px,65vw);
    object-fit:contain;
    filter:drop-shadow(0 2px 8px rgba(0,150,170,0.18));
    animation:logoFade 0.6s ease both;
  }
  @keyframes logoFade{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}

  /* SCROLL */
  .scroll-area{
    flex:1;width:100%;overflow-y:auto;overflow-x:hidden;
    display:flex;align-items:center;justify-content:center;
    padding:clamp(20px,4vw,40px) 16px clamp(24px,4vw,40px);
    -webkit-overflow-scrolling:touch;
  }
  .scene{width:100%;max-width:440px;}

  /* CARD */
  .glass-card{
    background:rgba(255,255,255,0.28);
    backdrop-filter:blur(40px) saturate(180%) brightness(1.08);
    -webkit-backdrop-filter:blur(40px) saturate(180%) brightness(1.08);
    border-radius:clamp(20px,5vw,32px);
    border-top:1.5px solid rgba(255,255,255,0.88);
    border-left:1px solid rgba(255,255,255,0.65);
    border-right:1px solid rgba(116,252,255,0.3);
    border-bottom:1px solid rgba(116,252,255,0.18);
    padding:clamp(28px,5vw,48px) clamp(22px,5vw,44px) clamp(24px,4vw,40px);
    box-shadow:0 20px 60px rgba(0,180,200,0.15),0 8px 24px rgba(0,0,0,0.06),0 1.5px 0 rgba(255,255,255,0.9) inset;
    animation:fadeUp 0.75s cubic-bezier(0.34,1.4,0.64,1) both;
    position:relative;overflow:hidden;
  }
  .glass-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.22) 0%,transparent 60%);border-radius:inherit;pointer-events:none;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(32px) scale(0.95);}to{opacity:1;transform:translateY(0) scale(1);}}

  .lock-wrap{display:flex;justify-content:center;margin-bottom:clamp(18px,3.5vw,28px);}
  .lock-icon{
    width:clamp(52px,11vw,68px);height:clamp(52px,11vw,68px);
    background:rgba(255,255,255,0.45);
    border-top:1.5px solid rgba(255,255,255,0.9);border-left:1px solid rgba(255,255,255,0.7);
    border-right:1px solid rgba(116,252,255,0.4);border-bottom:1px solid rgba(116,252,255,0.2);
    border-radius:clamp(14px,3vw,20px);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 6px 20px rgba(0,180,200,0.18),0 1px 0 rgba(255,255,255,0.8) inset;
    animation:iconPop 0.85s cubic-bezier(0.34,1.6,0.64,1) 0.1s both;
  }
  @keyframes iconPop{from{opacity:0;transform:scale(0.5) rotate(-10deg);}to{opacity:1;transform:scale(1) rotate(0);}}
  .lock-icon svg{width:clamp(22px,5vw,28px);height:clamp(22px,5vw,28px);}

  h1{color:#00464d;font-size:clamp(19px,5vw,25px);font-weight:700;text-align:center;letter-spacing:-0.4px;margin-bottom:6px;}
  .subtitle{color:rgba(0,100,110,0.62);font-size:clamp(12px,3.5vw,14px);text-align:center;margin-bottom:clamp(24px,4.5vw,36px);line-height:1.5;}

  .input-wrap{position:relative;margin-bottom:10px;}
  .input-wrap input{
    width:100%;
    padding:clamp(13px,3vw,16px) clamp(44px,10vw,52px) clamp(13px,3vw,16px) clamp(16px,3.5vw,20px);
    background:rgba(255,255,255,0.45);
    border-top:1px solid rgba(255,255,255,0.9);border-left:1px solid rgba(255,255,255,0.7);
    border-right:1px solid rgba(116,252,255,0.35);border-bottom:1px solid rgba(116,252,255,0.25);
    border-radius:clamp(12px,2.5vw,16px);
    color:#00464d;font-size:clamp(15px,4vw,16px);font-family:inherit;
    outline:none;transition:all 0.25s ease;-webkit-appearance:none;
    box-shadow:0 2px 12px rgba(0,180,200,0.08),0 1px 0 rgba(255,255,255,0.7) inset;
  }
  .input-wrap input::placeholder{color:rgba(0,120,130,0.38);}
  .input-wrap input:focus{
    border-top-color:rgba(0,180,200,0.7);border-left-color:rgba(0,180,200,0.5);
    background:rgba(255,255,255,0.65);
    box-shadow:0 0 0 3px rgba(0,200,210,0.18),0 1px 0 rgba(255,255,255,0.8) inset;
  }

  .toggle-eye{position:absolute;right:clamp(12px,3vw,16px);top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:6px;color:rgba(0,140,150,0.45);transition:color 0.2s;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
  .toggle-eye:hover{color:rgba(0,140,150,0.75);}

  .error-msg{
    display:flex;align-items:center;gap:8px;
    background:rgba(255,80,80,0.09);border:1px solid rgba(255,80,80,0.25);
    border-radius:clamp(10px,2vw,13px);
    padding:clamp(9px,2vw,11px) clamp(12px,2.5vw,15px);margin-bottom:10px;
    opacity:0;transform:translateY(-6px) scale(0.98);
    transition:all 0.35s cubic-bezier(0.34,1.3,0.64,1);pointer-events:none;
  }
  .error-msg.show{opacity:1;transform:translateY(0) scale(1);pointer-events:auto;}
  .error-msg span{color:rgba(200,40,40,0.9);font-size:clamp(12px,3vw,13.5px);}

  .btn{
    width:100%;padding:clamp(13px,3vw,17px);
    background:linear-gradient(135deg,rgba(0,190,210,0.88),rgba(0,150,170,0.92));
    border-top:1px solid rgba(116,252,255,0.7);border-left:1px solid rgba(116,252,255,0.5);
    border-right:1px solid rgba(0,180,200,0.3);border-bottom:1px solid rgba(0,140,160,0.2);
    border-radius:clamp(12px,2.5vw,16px);
    color:#fff;font-size:clamp(14px,3.8vw,16px);font-weight:600;font-family:inherit;
    cursor:pointer;letter-spacing:0.2px;transition:all 0.22s ease;
    box-shadow:0 6px 22px rgba(0,180,200,0.35),0 1px 0 rgba(255,255,255,0.4) inset;
    position:relative;overflow:hidden;touch-action:manipulation;-webkit-tap-highlight-color:transparent;
  }
  .btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.18) 0%,transparent 60%);border-radius:inherit;pointer-events:none;}
  .btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(0,180,200,0.5);}
  .btn:active{transform:scale(0.97);}
  .btn.loading{pointer-events:none;}
  .btn .btn-text{transition:opacity 0.2s;}
  .btn.loading .btn-text{opacity:0;}
  .btn .spinner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:20px;height:20px;border:2.5px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;opacity:0;animation:spin 0.7s linear infinite;}
  .btn.loading .spinner{opacity:1;}
  @keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg);}}
  @keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-8px);}40%{transform:translateX(8px);}60%{transform:translateX(-5px);}80%{transform:translateX(5px);}}
  .shake{animation:shake 0.45s ease;}

  /* OVERLAY */
  .overlay{
    position:fixed;inset:0;z-index:300;
    background:rgba(0,60,70,0.35);
    backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
    display:flex;align-items:center;justify-content:center;padding:16px;
    opacity:0;pointer-events:none;transition:opacity 0.35s ease;
  }
  .overlay.show{opacity:1;pointer-events:auto;}
  .popup{
    background:rgba(255,255,255,0.32);
    backdrop-filter:blur(50px) saturate(200%) brightness(1.1);
    -webkit-backdrop-filter:blur(50px) saturate(200%) brightness(1.1);
    border-top:1.5px solid rgba(255,255,255,0.9);border-left:1px solid rgba(255,255,255,0.7);
    border-right:1px solid rgba(116,252,255,0.35);border-bottom:1px solid rgba(116,252,255,0.2);
    border-radius:clamp(20px,5vw,30px);
    padding:clamp(30px,5vw,44px) clamp(22px,5vw,40px) clamp(26px,4.5vw,38px);
    width:100%;max-width:360px;text-align:center;
    box-shadow:0 28px 72px rgba(0,140,160,0.22),0 1.5px 0 rgba(255,255,255,0.9) inset;
    transform:scale(0.86) translateY(24px);
    transition:transform 0.5s cubic-bezier(0.34,1.5,0.64,1);
    position:relative;overflow:hidden;
  }
  .popup::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.2) 0%,transparent 55%);border-radius:inherit;pointer-events:none;}
  .overlay.show .popup{transform:scale(1) translateY(0);}

  .success-ring{
    width:clamp(58px,13vw,76px);height:clamp(58px,13vw,76px);
    margin:0 auto clamp(16px,3.5vw,24px);border-radius:50%;
    background:rgba(0,200,160,0.1);border:1.5px solid rgba(0,200,160,0.4);
    display:flex;align-items:center;justify-content:center;
    animation:pulse-ring 2.2s ease-in-out infinite;
  }
  @keyframes pulse-ring{0%,100%{box-shadow:0 0 0 0 rgba(0,200,160,0.35);}50%{box-shadow:0 0 0 14px rgba(0,200,160,0);}}
  .success-ring svg{width:clamp(22px,5.5vw,32px);height:clamp(22px,5.5vw,32px);}

  .popup h2{color:#003d44;font-size:clamp(18px,5vw,23px);font-weight:700;margin-bottom:8px;letter-spacing:-0.3px;}
  .popup p{color:rgba(0,80,90,0.6);font-size:clamp(12.5px,3.5vw,14.5px);line-height:1.65;margin-bottom:clamp(16px,3.5vw,22px);}

  .redirect-bar{
    background:rgba(255,255,255,0.35);border:1px solid rgba(116,252,255,0.4);
    border-radius:clamp(10px,2.5vw,13px);
    padding:clamp(9px,2vw,11px) clamp(12px,2.5vw,15px);margin-bottom:clamp(12px,2.5vw,18px);
    display:flex;align-items:center;gap:7px;flex-wrap:wrap;
  }
  .redirect-bar .label{color:rgba(0,100,110,0.5);font-size:clamp(11px,3vw,12.5px);}
  .redirect-bar .url{color:rgba(0,150,165,0.95);font-size:clamp(11px,3vw,12.5px);font-weight:600;word-break:break-all;}

  .ring-wrap{position:relative;width:52px;height:52px;margin:0 auto 8px;}
  .ring-wrap svg{transform:rotate(-90deg);}
  .ring-bg{fill:none;stroke:rgba(0,180,200,0.12);stroke-width:3;}
  .ring-prog{fill:none;stroke:rgba(0,190,160,0.75);stroke-width:3;stroke-linecap:round;stroke-dasharray:132;stroke-dashoffset:0;transition:stroke-dashoffset 0.95s linear;}
  .ring-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:rgba(0,160,140,0.9);font-size:17px;font-weight:700;}
  .countdown{font-size:clamp(11px,3vw,13px);color:rgba(0,100,110,0.45);margin-bottom:clamp(14px,3vw,20px);}
  .countdown b{color:rgba(0,170,140,0.9);font-weight:700;}

  .popup-btn{
    width:100%;padding:clamp(12px,3vw,15px);
    background:linear-gradient(135deg,rgba(0,195,155,0.82),rgba(0,155,120,0.85));
    border-top:1px solid rgba(0,220,180,0.5);border-left:1px solid rgba(0,210,170,0.35);
    border-right:1px solid rgba(0,160,125,0.2);border-bottom:1px solid rgba(0,140,108,0.15);
    border-radius:clamp(11px,2.5vw,15px);
    color:#fff;font-size:clamp(13.5px,3.8vw,15.5px);font-weight:600;font-family:inherit;
    cursor:pointer;
    box-shadow:0 6px 20px rgba(0,180,140,0.3),0 1px 0 rgba(255,255,255,0.35) inset;
    transition:all 0.2s;position:relative;overflow:hidden;
    touch-action:manipulation;-webkit-tap-highlight-color:transparent;
  }
  .popup-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.15) 0%,transparent 55%);border-radius:inherit;pointer-events:none;}
  .popup-btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(0,180,140,0.45);}
  .popup-btn:active{transform:scale(0.97);}

  @media(max-width:480px){
    .scroll-area{align-items:flex-start;padding-top:clamp(16px,4vh,28px);}
    .scene{max-width:100%;}
  }
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<!-- HEADER -->
<header class="header">
  <div class="logo-wrap">
    <img
      src="https://cdn.shopify.com/s/files/1/0754/4645/2324/files/banner_e8224293-59d6-443c-8db3-40993700a88a.png?v=1775755181"
      alt="Monkey Garage"
    />
  </div>
</header>

<!-- MAIN -->
<div class="scroll-area">
  <div class="scene">
    <div class="glass-card">
      <div class="lock-wrap">
        <div class="lock-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="rgba(0,100,115,0.85)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="3.5"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
      </div>
      <h1>Private Access</h1>
      <p class="subtitle">Enter the key🔑, That decoded from hint! </p>

      <div class="input-wrap">
        <input type="password" id="pwInput" placeholder="Enter 🔑…" autocomplete="current-password" />
        <button class="toggle-eye" onclick="toggleEye()" tabindex="-1" aria-label="Toggle visibility">
          <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>

      <div class="error-msg" id="errMsg">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="rgba(200,50,50,0.9)" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span>Incorrect password. Please try again.</span>
      </div>

      <button class="btn" id="submitBtn" onclick="checkPassword()">
        <span class="btn-text">Unlock</span>
        <div class="spinner"></div>
      </button>
    </div>
  </div>
</div>

<!-- SUCCESS POPUP -->
<div class="overlay" id="overlay">
  <div class="popup">
    <div class="success-ring">
      <svg viewBox="0 0 24 24" fill="none" stroke="rgba(0,195,155,0.95)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h2>Access Granted</h2>
    <p>Welcome to Monkey Garage! Redirecting you now.</p>
    <div class="redirect-bar">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(0,150,165,0.5)" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="2" y1="12" x2="22" y2="12"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
      <span class="label">Redirecting to</span>
      <span class="url">monkeygarage.in</span>
    </div>
    <div class="ring-wrap">
      <svg width="52" height="52" viewBox="0 0 52 52">
        <circle class="ring-bg" cx="26" cy="26" r="21"/>
        <circle class="ring-prog" id="ringProg" cx="26" cy="26" r="21"/>
      </svg>
      <div class="ring-num" id="countNum">3</div>
    </div>
    <p class="countdown">Redirecting in <b id="countTxt">3</b> seconds…</p>
    <button class="popup-btn" onclick="doRedirect()">Go now →</button>
  </div>
</div>

<script>
  const CORRECT  = '66';
  const REDIRECT = 'https://monkeygarage.in/';
  const CIRC     = 2 * Math.PI * 21;

  const input    = document.getElementById('pwInput');
  const errMsg   = document.getElementById('errMsg');
  const btn      = document.getElementById('submitBtn');
  const overlay  = document.getElementById('overlay');
  const ringProg = document.getElementById('ringProg');
  const countNum = document.getElementById('countNum');
  const countTxt = document.getElementById('countTxt');

  let cdInterval, unlocked = false;
  ringProg.style.strokeDasharray  = CIRC;
  ringProg.style.strokeDashoffset = 0;

  input.addEventListener('keydown', e => { if (e.key === 'Enter') checkPassword(); });
  input.addEventListener('input',   () => errMsg.classList.remove('show'));

  function toggleEye() {
    const show = input.type === 'password';
    input.type = show ? 'text' : 'password';
    document.getElementById('eyeIcon').innerHTML = show
      ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
      : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }

  function checkPassword() {
    if (unlocked) return;
    btn.classList.add('loading');
    setTimeout(() => {
      btn.classList.remove('loading');
      if (input.value === CORRECT) {
        unlocked = true;
        overlay.classList.add('show');
        startCountdown();
      } else {
        errMsg.classList.add('show');
        input.classList.add('shake');
        input.value = '';
        input.focus();
        setTimeout(() => input.classList.remove('shake'), 500);
      }
    }, 700);
  }

  function startCountdown() {
    const TOTAL = 3, STEP = 100;
    const STEPS = (TOTAL * 1000) / STEP;
    let elapsed = 0;
    cdInterval = setInterval(() => {
      elapsed++;
      const frac     = elapsed / STEPS;
      const secsLeft = Math.ceil(TOTAL - frac * TOTAL);
      ringProg.style.strokeDashoffset = CIRC * frac;
      countNum.textContent = secsLeft > 0 ? secsLeft : 0;
      countTxt.textContent = secsLeft > 0 ? secsLeft : 0;
      if (elapsed >= STEPS) { clearInterval(cdInterval); doRedirect(); }
    }, STEP);
  }

  function doRedirect() {
    clearInterval(cdInterval);
    window.location.href = REDIRECT;
  }
</script>
</body>
</html>
