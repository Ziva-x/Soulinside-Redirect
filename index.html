<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}

  body {
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    background: linear-gradient(145deg, #0d0d1a 0%, #1a0533 35%, #0a1628 65%, #0d0d1a 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(70px);
    opacity: 0.6;
    pointer-events: none;
    animation: drift 10s ease-in-out infinite alternate;
  }
  .orb1 { width: min(500px, 80vw); height: min(500px, 80vw); background: radial-gradient(circle, #7c3aed, #4c1d95); top: -15%; left: -15%; animation-delay: 0s; }
  .orb2 { width: min(400px, 70vw); height: min(400px, 70vw); background: radial-gradient(circle, #0ea5e9, #0369a1); bottom: -10%; right: -10%; animation-delay: -4s; }
  .orb3 { width: min(300px, 60vw); height: min(300px, 60vw); background: radial-gradient(circle, #ec4899, #be185d); bottom: 20%; left: 10%; animation-delay: -7s; }
  .orb4 { width: min(250px, 50vw); height: min(250px, 50vw); background: radial-gradient(circle, #10b981, #065f46); top: 30%; right: 5%; animation-delay: -2s; }

  @keyframes drift {
    0%   { transform: translate(0,0) scale(1); }
    100% { transform: translate(25px,20px) scale(1.1); }
  }

  /* Glass card */
  .scene {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 460px;
    padding: 16px;
  }

  .glass-card {
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(48px) saturate(180%) brightness(1.1);
    -webkit-backdrop-filter: blur(48px) saturate(180%) brightness(1.1);
    border-radius: clamp(20px, 5vw, 36px);
    border-top: 1px solid rgba(255,255,255,0.28);
    border-left: 1px solid rgba(255,255,255,0.18);
    border-right: 1px solid rgba(255,255,255,0.08);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    padding: clamp(32px, 6vw, 56px) clamp(24px, 6vw, 52px) clamp(28px, 5vw, 48px);
    box-shadow:
      0 24px 64px rgba(0,0,0,0.5),
      0 8px 32px rgba(0,0,0,0.3),
      0 1px 0 rgba(255,255,255,0.22) inset;
    animation: fadeUp 0.8s cubic-bezier(0.34,1.4,0.64,1) both;
    position: relative;
    overflow: hidden;
  }

  /* Inner glass shimmer */
  .glass-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 60%);
    border-radius: inherit;
    pointer-events: none;
  }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(40px) scale(0.94); }
    to   { opacity:1; transform:translateY(0) scale(1); }
  }

  /* Lock icon */
  .lock-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: clamp(20px,4vw,32px);
  }
  .lock-icon {
    width: clamp(56px,12vw,72px);
    height: clamp(56px,12vw,72px);
    background: rgba(255,255,255,0.09);
    border-top: 1px solid rgba(255,255,255,0.3);
    border-left: 1px solid rgba(255,255,255,0.18);
    border-right: 1px solid rgba(255,255,255,0.08);
    border-bottom: 1px solid rgba(255,255,255,0.05);
    border-radius: clamp(14px,3vw,22px);
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3), 0 1px 0 rgba(255,255,255,0.18) inset;
    animation: iconPop 0.9s cubic-bezier(0.34,1.6,0.64,1) 0.1s both;
  }
  @keyframes iconPop {
    from { opacity:0; transform:scale(0.5) rotate(-10deg); }
    to   { opacity:1; transform:scale(1) rotate(0); }
  }
  .lock-icon svg { width: clamp(22px,5vw,30px); height: clamp(22px,5vw,30px); }

  h1 {
    color: rgba(255,255,255,0.96);
    font-size: clamp(20px,5vw,26px);
    font-weight: 600;
    text-align: center;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
  }
  .subtitle {
    color: rgba(255,255,255,0.42);
    font-size: clamp(13px,3.5vw,15px);
    text-align: center;
    margin-bottom: clamp(28px,5vw,40px);
    font-weight: 400;
    line-height: 1.5;
  }

  /* Input */
  .input-wrap { position: relative; margin-bottom: 12px; }

  .input-wrap input {
    width: 100%;
    padding: clamp(13px,3vw,17px) clamp(44px,10vw,54px) clamp(13px,3vw,17px) clamp(16px,4vw,22px);
    background: rgba(255,255,255,0.06);
    border-top: 1px solid rgba(255,255,255,0.18);
    border-left: 1px solid rgba(255,255,255,0.12);
    border-right: 1px solid rgba(255,255,255,0.06);
    border-bottom: 1px solid rgba(255,255,255,0.04);
    border-radius: clamp(12px,3vw,18px);
    color: rgba(255,255,255,0.92);
    font-size: clamp(15px,4vw,17px);
    font-family: inherit;
    outline: none;
    transition: all 0.25s ease;
    backdrop-filter: blur(10px);
    -webkit-appearance: none;
  }
  .input-wrap input::placeholder { color: rgba(255,255,255,0.25); }
  .input-wrap input:focus {
    border-top-color: rgba(167,139,250,0.7);
    border-left-color: rgba(167,139,250,0.5);
    background: rgba(255,255,255,0.09);
    box-shadow: 0 0 0 3px rgba(139,92,246,0.22);
  }

  .toggle-eye {
    position: absolute; right: clamp(12px,3vw,18px); top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; padding: 6px;
    color: rgba(255,255,255,0.3); transition: color 0.2s;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .toggle-eye:hover { color: rgba(255,255,255,0.65); }

  /* Error */
  .error-msg {
    display: flex; align-items: center; gap: 8px;
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.28);
    border-radius: clamp(10px,2.5vw,14px);
    padding: clamp(9px,2vw,12px) clamp(12px,3vw,16px);
    margin-bottom: 12px;
    opacity: 0; transform: translateY(-6px) scale(0.98);
    transition: all 0.35s cubic-bezier(0.34,1.3,0.64,1);
    pointer-events: none;
  }
  .error-msg.show { opacity:1; transform:translateY(0) scale(1); pointer-events:auto; }
  .error-msg span { color: rgba(252,129,129,0.95); font-size: clamp(12px,3.5vw,14px); }

  /* Button */
  .btn {
    width: 100%;
    padding: clamp(14px,3.5vw,18px);
    background: linear-gradient(135deg, rgba(124,58,237,0.9), rgba(79,70,229,0.9));
    border-top: 1px solid rgba(167,139,250,0.5);
    border-left: 1px solid rgba(167,139,250,0.3);
    border-right: 1px solid rgba(99,102,241,0.2);
    border-bottom: 1px solid rgba(79,70,229,0.1);
    border-radius: clamp(12px,3vw,18px);
    color: rgba(255,255,255,0.97);
    font-size: clamp(15px,4vw,17px);
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 0.2px;
    transition: all 0.22s ease;
    box-shadow: 0 6px 24px rgba(124,58,237,0.4), 0 1px 0 rgba(255,255,255,0.18) inset;
    position: relative; overflow: hidden;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .btn::after {
    content:'';
    position:absolute; inset:0;
    background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
    border-radius: inherit; pointer-events:none;
  }
  .btn:hover { transform:translateY(-2px); box-shadow:0 10px 32px rgba(124,58,237,0.55); }
  .btn:active { transform:scale(0.97); }
  .btn.loading { pointer-events:none; }
  .btn .btn-text { transition:opacity 0.2s; }
  .btn.loading .btn-text { opacity:0; }
  .btn .spinner {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:20px; height:20px;
    border:2px solid rgba(255,255,255,0.25);
    border-top-color:#fff;
    border-radius:50%; opacity:0;
    animation:spin 0.7s linear infinite;
  }
  .btn.loading .spinner { opacity:1; }
  @keyframes spin { to { transform:translate(-50%,-50%) rotate(360deg); } }

  @keyframes shake {
    0%,100% { transform:translateX(0); }
    20% { transform:translateX(-9px); }
    40% { transform:translateX(9px); }
    60% { transform:translateX(-5px); }
    80% { transform:translateX(5px); }
  }
  .shake { animation:shake 0.45s ease; }

  /* Hint */
  .hint {
    margin-top: clamp(18px,4vw,26px);
    text-align: center;
    color: rgba(255,255,255,0.18);
    font-size: clamp(11px,3vw,13px);
  }
  .hint code { color: rgba(167,139,250,0.55); font-size: inherit; }

  /* ===== OVERLAY ===== */
  .overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    display: flex; align-items: center; justify-content: center;
    padding: 16px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.35s ease;
  }
  .overlay.show { opacity:1; pointer-events:auto; }

  .popup {
    background: rgba(255,255,255,0.09);
    backdrop-filter: blur(56px) saturate(200%) brightness(1.12);
    -webkit-backdrop-filter: blur(56px) saturate(200%) brightness(1.12);
    border-top: 1px solid rgba(255,255,255,0.3);
    border-left: 1px solid rgba(255,255,255,0.18);
    border-right: 1px solid rgba(255,255,255,0.08);
    border-bottom: 1px solid rgba(255,255,255,0.05);
    border-radius: clamp(20px,5vw,32px);
    padding: clamp(32px,6vw,48px) clamp(24px,6vw,44px) clamp(28px,5vw,40px);
    width: 100%;
    max-width: 380px;
    text-align: center;
    box-shadow: 0 32px 80px rgba(0,0,0,0.55), 0 1px 0 rgba(255,255,255,0.22) inset;
    transform: scale(0.86) translateY(24px);
    transition: transform 0.5s cubic-bezier(0.34,1.5,0.64,1);
    position: relative; overflow: hidden;
  }
  .popup::before {
    content:'';
    position:absolute; inset:0;
    background: linear-gradient(135deg, rgba(255,255,255,0.07) 0%, transparent 55%);
    border-radius:inherit; pointer-events:none;
  }
  .overlay.show .popup { transform:scale(1) translateY(0); }

  .success-ring {
    width: clamp(60px,14vw,80px);
    height: clamp(60px,14vw,80px);
    margin: 0 auto clamp(18px,4vw,28px);
    border-radius: 50%;
    background: rgba(52,211,153,0.12);
    border: 1.5px solid rgba(52,211,153,0.4);
    display: flex; align-items: center; justify-content: center;
    animation: pulse-ring 2.2s ease-in-out infinite;
  }
  @keyframes pulse-ring {
    0%,100% { box-shadow:0 0 0 0 rgba(52,211,153,0.35); }
    50%      { box-shadow:0 0 0 14px rgba(52,211,153,0); }
  }
  .success-ring svg { width: clamp(24px,6vw,34px); height: clamp(24px,6vw,34px); }

  .popup h2 { color:rgba(255,255,255,0.96); font-size:clamp(19px,5vw,24px); font-weight:600; margin-bottom:10px; letter-spacing:-0.3px; }
  .popup p  { color:rgba(255,255,255,0.52); font-size:clamp(13px,3.5vw,15px); line-height:1.65; margin-bottom:clamp(18px,4vw,26px); }

  .redirect-bar {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: clamp(10px,2.5vw,14px);
    padding: clamp(9px,2vw,12px) clamp(12px,3vw,16px);
    margin-bottom: clamp(14px,3vw,20px);
    display: flex; align-items: center; gap: 8px;
    flex-wrap: wrap;
  }
  .redirect-bar .label { color:rgba(255,255,255,0.38); font-size:clamp(11px,3vw,13px); }
  .redirect-bar .url   { color:rgba(167,139,250,0.88); font-size:clamp(11px,3vw,13px); font-weight:500; word-break:break-all; }

  .countdown { font-size:clamp(11px,3vw,13.5px); color:rgba(255,255,255,0.35); margin-bottom:clamp(16px,3.5vw,22px); }
  .countdown b { color:rgba(52,211,153,0.85); font-weight:600; }

  .popup-btn {
    width: 100%;
    padding: clamp(13px,3vw,16px);
    background: linear-gradient(135deg, rgba(52,211,153,0.72), rgba(16,185,129,0.72));
    border-top: 1px solid rgba(52,211,153,0.4);
    border-left: 1px solid rgba(52,211,153,0.25);
    border-right: 1px solid rgba(16,185,129,0.15);
    border-bottom: 1px solid rgba(16,185,129,0.1);
    border-radius: clamp(12px,3vw,16px);
    color: rgba(255,255,255,0.97);
    font-size: clamp(14px,4vw,16px);
    font-weight: 500; font-family: inherit;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(16,185,129,0.35), 0 1px 0 rgba(255,255,255,0.18) inset;
    transition: all 0.2s;
    position: relative; overflow: hidden;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .popup-btn::after { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(255,255,255,0.1) 0%,transparent 55%); border-radius:inherit; pointer-events:none; }
  .popup-btn:hover { transform:translateY(-2px); box-shadow:0 10px 28px rgba(16,185,129,0.48); }
  .popup-btn:active { transform:scale(0.97); }

  /* Responsive tweaks */
  @media (max-width: 480px) {
    body { align-items: flex-start; padding-top: clamp(40px, 10vh, 80px); }
    .scene { padding: 12px; }
  }
  @media (min-width: 481px) {
    body { align-items: center; }
  }
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>
<div class="orb orb4"></div>

<div class="scene">
  <div class="glass-card">
    <div class="lock-wrap">
      <div class="lock-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.88)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="3.5"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
    </div>

    <h1>Private Access</h1>
    <p class="subtitle">Enter your password to continue</p>

    <div class="input-wrap">
      <input type="password" id="pwInput" placeholder="Enter password…" autocomplete="current-password" />
      <button class="toggle-eye" id="eyeBtn" onclick="toggleEye()" tabindex="-1" aria-label="Toggle password visibility">
        <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>

    <div class="error-msg" id="errMsg">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="rgba(252,129,129,0.9)" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span>Incorrect password. Please try again.</span>
    </div>

    <button class="btn" id="submitBtn" onclick="checkPassword()">
      <span class="btn-text">Unlock</span>
      <div class="spinner"></div>
    </button>

    <p class="hint">Demo: <code>secret123</code></p>
  </div>
</div>

<!-- Success Popup -->
<div class="overlay" id="overlay">
  <div class="popup">
    <div class="success-ring">
      <svg viewBox="0 0 24 24" fill="none" stroke="rgba(52,211,153,0.92)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h2>Access Granted</h2>
    <p>Your identity has been verified. Redirecting you to your destination now.</p>
    <div class="redirect-bar">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      <span class="label">Redirecting to</span>
      <span class="url">google.com</span>
    </div>
    <p class="countdown">Auto-redirect in <b id="countNum">3</b> seconds…</p>
    <button class="popup-btn" onclick="doRedirect()">Go now →</button>
  </div>
</div>

<script>
  const CORRECT  = 'secret123';
  const REDIRECT = 'https://www.google.com';

  const input   = document.getElementById('pwInput');
  const errMsg  = document.getElementById('errMsg');
  const btn     = document.getElementById('submitBtn');
  const overlay = document.getElementById('overlay');
  let countdown, unlocked = false;

  input.addEventListener('keydown', e => { if (e.key === 'Enter') checkPassword(); });
  input.addEventListener('input',   () => { errMsg.classList.remove('show'); });

  function toggleEye() {
    const show = input.type === 'password';
    input.type = show ? 'text' : 'password';
    document.getElementById('eyeIcon').innerHTML = show
      ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
      : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }

  function checkPassword() {
    if (unlocked) return;
    btn.classList.add('loading');
    setTimeout(() => {
      btn.classList.remove('loading');
      if (input.value === CORRECT) {
        unlocked = true;
        overlay.classList.add('show');
        startCountdown();
      } else {
        errMsg.classList.add('show');
        input.classList.add('shake');
        input.value = '';
        input.focus();
        setTimeout(() => input.classList.remove('shake'), 500);
      }
    }, 750);
  }

  function startCountdown() {
    let t = 3;
    document.getElementById('countNum').textContent = t;
    countdown = setInterval(() => {
      t--;
      document.getElementById('countNum').textContent = t;
      if (t <= 0) { clearInterval(countdown); doRedirect(); }
    }, 1000);
  }

  function doRedirect() {
    clearInterval(countdown);
    window.open(REDIRECT, '_blank');
  }
</script>
</body>
</html>
